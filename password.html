<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enter Password</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Lato', sans-serif;
    background: #120608;
    overflow: hidden;
    position: relative;
    padding: 24px;
  }

  .orb { position: fixed; border-radius: 50%; filter: blur(100px); opacity: 0.1; pointer-events: none; z-index: 0; }
  .orb-1 { width: 500px; height: 500px; background: #c0415a; top: -150px; right: -80px; animation: drift 14s ease-in-out infinite alternate; }
  .orb-2 { width: 350px; height: 350px; background: #6a1030; bottom: -80px; left: -60px; animation: drift 18s ease-in-out infinite alternate-reverse; }
  @keyframes drift { from{transform:translate(0,0);} to{transform:translate(30px,20px);} }

  .rain { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .drop { position:absolute; top:-20px; width:1px; background:linear-gradient(to bottom,transparent,rgba(192,65,90,0.2)); animation:fall linear infinite; }
  @keyframes fall { to{transform:translateY(110vh);} }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, transparent 30%, rgba(5,0,3,0.75) 100%);
    pointer-events: none; z-index: 0;
  }

  .card {
    position: relative; z-index: 1;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(192, 65, 90, 0.2);
    border-radius: 4px;
    padding: 52px 48px 44px;
    width: 380px;
    text-align: center;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.04);
    animation: appear 0.9s cubic-bezier(0.34, 1.2, 0.64, 1) both;
  }
  @keyframes appear {
    from { opacity: 0; transform: translateY(20px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .card-emoji {
    font-size: 36px;
    display: block;
    margin-bottom: 14px;
    animation: sway 4s ease-in-out infinite;
  }
  @keyframes sway { 0%,100%{transform:rotate(-4deg);} 50%{transform:rotate(4deg);} }

  .card-tag {
    font-size: 10px; letter-spacing: 4px; text-transform: uppercase;
    color: rgba(192,65,90,0.5); margin-bottom: 6px;
    font-family: 'Lato', sans-serif; font-weight: 300;
  }

  h2 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300; font-size: 24px;
    color: #f5e6ea; margin-bottom: 6px;
    letter-spacing: 0.3px;
  }
  .subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic; font-size: 14px;
    color: rgba(232,196,160,0.4);
    margin-bottom: 36px;
  }

  .input-group { margin-bottom: 20px; }
  .input-label {
    display: block; text-align: left;
    font-size: 10px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    color: rgba(192,65,90,0.6); margin-bottom: 8px;
    font-family: 'Lato', sans-serif;
  }
  .input-wrap { position: relative; }

  #passwordInput {
    width: 100%;
    padding: 14px 46px 14px 16px;
    font-size: 15px; font-family: 'Lato', sans-serif;
    font-weight: 400; letter-spacing: 3px;
    border-radius: 3px;
    border: 1px solid rgba(192,65,90,0.25);
    background: rgba(192,65,90,0.05);
    outline: none;
    color: #f5e6ea;
    transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
  }
  #passwordInput::placeholder { color: rgba(245,230,234,0.2); font-weight: 300; letter-spacing: 1px; font-size: 13px; }
  #passwordInput:focus {
    border-color: rgba(192,65,90,0.6);
    background: rgba(192,65,90,0.08);
    box-shadow: 0 0 0 3px rgba(192,65,90,0.1);
  }

  .toggle-btn {
    position: absolute; right: 14px; top: 50%;
    transform: translateY(-50%);
    cursor: pointer; font-size: 15px; line-height: 1;
    user-select: none; transition: transform 0.2s; opacity: 0.5;
  }
  .toggle-btn:hover { transform: translateY(-50%) scale(1.2); opacity: 0.8; }

  .submit-btn {
    width: 100%; padding: 14px;
    font-size: 12px; font-family: 'Lato', sans-serif;
    font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase;
    background: #c0415a; color: white;
    border: none; border-radius: 3px; cursor: pointer;
    transition: transform 0.25s, box-shadow 0.25s, background 0.25s;
    box-shadow: 0 6px 24px rgba(192,65,90,0.3);
    position: relative; overflow: hidden;
  }
  .submit-btn::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.08), transparent);
  }
  .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(192,65,90,0.45); background: #a83450; }
  .submit-btn:active { transform: translateY(0); }

  .error-msg {
    min-height: 22px; margin-top: 16px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic; font-size: 14px;
    color: rgba(192,65,90,0.8); letter-spacing: 0.3px;
  }
  .error-msg.shake { animation: shake 0.4s cubic-bezier(0.36,0.07,0.19,0.97); }
  @keyframes shake {
    10%,90%{transform:translateX(-3px);}
    20%,80%{transform:translateX(4px);}
    30%,50%,70%{transform:translateX(-5px);}
    40%,60%{transform:translateX(5px);}
  }

  .divider {
    display:flex; align-items:center; gap:10px;
    margin: 28px 0 0;
  }
  .div-line { flex:1; height:1px; background:linear-gradient(to right,transparent,rgba(192,65,90,0.25),transparent); }
  .div-dot { color: rgba(192,65,90,0.4); font-size:9px; }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="rain" id="rain"></div>

<div class="card">
  <span class="card-emoji">🥀</span>
  <p class="card-tag">Chờ một chút...</p>
  <h2>Bí mật nho nhỏ</h2>
  <p class="subtitle">Nhập mật khẩu để tiếp tục nhé</p>

  <div class="input-group">
    <label class="input-label" for="passwordInput">Mật khẩu</label>
    <div class="input-wrap">
      <input type="password" id="passwordInput" placeholder="Ngày tháng sinh của em ..." autocomplete="off"
             onkeydown="if(event.key==='Enter') checkPassword()">
      <span class="toggle-btn" id="toggleIcon" onclick="togglePassword()">👁️</span>
    </div>
  </div>

  <button class="submit-btn" onclick="checkPassword()">Xác nhận</button>
  <div class="error-msg" id="errorText"></div>

  <div class="divider">
    <div class="div-line"></div><div class="div-dot">♥</div><div class="div-line"></div>
  </div>
</div>

<script>
  const rain = document.getElementById('rain');
  for (let i = 0; i < 55; i++) {
    const d = document.createElement('div');
    d.className = 'drop';
    d.style.left = Math.random() * 100 + 'vw';
    d.style.height = (40 + Math.random() * 60) + 'px';
    d.style.animationDuration = (0.6 + Math.random() * 0.8) + 's';
    d.style.animationDelay = (Math.random() * 3) + 's';
    d.style.opacity = 0.2 + Math.random() * 0.3;
    rain.appendChild(d);
  }

  function checkPassword() {
    const pw = document.getElementById('passwordInput').value;
    const err = document.getElementById('errorText');
    if (pw === '1306') {
      window.location.href = 'letter.html';
    } else {
      err.textContent = '';
      err.classList.remove('shake');
      void err.offsetWidth;
      err.textContent = 'Sai mật khẩu rồi... thử lại nhé 😔';
      err.classList.add('shake');
    }
  }

  function togglePassword() {
    const input = document.getElementById('passwordInput');
    const icon = document.getElementById('toggleIcon');
    if (input.type === 'password') { input.type = 'text'; icon.textContent = '🙈'; }
    else { input.type = 'password'; icon.textContent = '👁️'; }
  }
</script>
</body>
</html>
