<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Women's Day, Ý 💕</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --rose: #b8001f;
    --rose-bright: #e0102e;
    --blush: #e8a87c;
    --gold: #c9882a;
    --gold-light: #f0cc70;
    --cream: #fdf3e3;
    --deep: #09020e;
    --dark-red: #1a0008;
  }

  body {
    background: var(--deep);
    font-family: 'Cormorant Garamond', serif;
    overflow-x: hidden;
    min-height: 100vh;
    cursor: none;
  }

  .cursor {
    width: 10px; height: 10px;
    background: var(--gold-light);
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 10px var(--gold);
  }
  .cursor-trail {
    width: 5px; height: 5px;
    background: var(--rose-bright);
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    opacity: 0.5;
    transition: all 0.3s ease;
  }

  .bg-layer {
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 50% -10%, #3a0010 0%, #14000a 55%, #09020e 100%);
    z-index: 0;
  }
  /* Gold shimmer vignette */
  .bg-layer::after {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 20% 80%, rgba(180,120,20,0.07) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(180,20,30,0.08) 0%, transparent 60%);
  }

  .bg-glow {
    position: fixed;
    border-radius: 50%;
    filter: blur(90px);
    pointer-events: none;
    z-index: 0;
  }
  .glow-1 { width: 700px; height: 500px; top: -200px; left: 50%; transform: translateX(-50%); background: rgba(180,0,30,0.22); }
  .glow-2 { width: 400px; height: 300px; bottom: -80px; left: -80px; background: rgba(180,120,20,0.13); }
  .glow-3 { width: 350px; height: 300px; bottom: -60px; right: -80px; background: rgba(180,0,30,0.10); }

  /* Gold ornament lines */
  .ornament-line {
    position: fixed;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(200,150,40,0.18), transparent);
    pointer-events: none; z-index: 1;
    width: 100%;
  }
  .ornament-line.top { top: 30px; }
  .ornament-line.bot { bottom: 30px; }
  .ornament-col {
    position: fixed;
    width: 1px;
    background: linear-gradient(180deg, transparent, rgba(200,150,40,0.15), transparent);
    pointer-events: none; z-index: 1;
    height: 100%;
    top: 0;
  }
  .ornament-col.left { left: 30px; }
  .ornament-col.right { right: 30px; }

  .stars {
    position: fixed; inset: 0; z-index: 0;
    pointer-events: none;
  }
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--dur, 3s) ease-in-out infinite;
    animation-delay: var(--delay, 0s);
    opacity: 0;
  }
  @keyframes twinkle {
    0%,100% { opacity: 0; transform: scale(0.5); }
    50% { opacity: var(--bright, 0.7); transform: scale(1.2); }
  }

  .petals-container {
    position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden;
  }
  .petal {
    position: absolute;
    top: -60px;
    font-size: var(--size, 18px);
    animation: fall var(--fall-dur, 9s) linear infinite;
    animation-delay: var(--fall-delay, 0s);
    opacity: 0.9;
  }
  @keyframes fall {
    0%   { transform: translateY(-60px) rotate(0deg) translateX(0); opacity: 0.9; }
    25%  { transform: translateY(25vh) rotate(90deg) translateX(25px); }
    50%  { transform: translateY(50vh) rotate(180deg) translateX(-15px); }
    75%  { transform: translateY(75vh) rotate(270deg) translateX(35px); }
    100% { transform: translateY(110vh) rotate(360deg) translateX(-8px); opacity: 0; }
  }

  .scene {
    position: relative; z-index: 10;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 60px 20px;
  }

  .date-tag {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--gold);
    font-size: 0.88rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 1s ease forwards 0.3s;
    margin-bottom: 18px;
  }

  /* Gold filigree ornament above title */
  .filigree {
    opacity: 0;
    animation: fadeUp 1s ease forwards 0.5s;
    margin-bottom: 18px;
    color: var(--gold);
    font-size: 1.3rem;
    letter-spacing: 0.4em;
    filter: drop-shadow(0 0 6px rgba(200,150,40,0.5));
  }

  .name-display {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(3.5rem, 12vw, 8rem);
    font-weight: 400;
    color: transparent;
    background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 40%, #a06010 70%, var(--gold-light) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    background-size: 200% 200%;
    animation: fadeUp 1.4s ease forwards 0.8s, gold-shimmer 5s ease-in-out infinite 2s;
    opacity: 0;
    line-height: 1;
    margin-bottom: 8px;
    filter: drop-shadow(0 0 30px rgba(200,150,40,0.4));
    letter-spacing: 0.05em;
  }
  @keyframes gold-shimmer {
    0%,100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .main-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1rem, 3vw, 1.35rem);
    font-weight: 300;
    font-style: italic;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(253,243,227,0.7);
    opacity: 0;
    animation: fadeUp 1s ease forwards 1.3s;
    margin-bottom: 60px;
  }

  .heart-wrapper {
    position: relative;
    opacity: 0;
    animation: fadeUp 1.5s ease forwards 1.7s;
    margin-bottom: 60px;
  }
  .heart-svg {
    width: 100px; height: 100px;
    filter: drop-shadow(0 0 18px rgba(184,0,31,0.7));
    animation: heartbeat 2s ease-in-out infinite 3s;
  }
  @keyframes heartbeat {
    0%,100% { transform: scale(1); filter: drop-shadow(0 0 18px rgba(184,0,31,0.7)); }
    15% { transform: scale(1.18); filter: drop-shadow(0 0 40px rgba(224,16,46,1)); }
    30% { transform: scale(1); }
    45% { transform: scale(1.10); filter: drop-shadow(0 0 28px rgba(184,0,31,0.85)); }
  }
  .heart-ring {
    position: absolute; inset: -18px;
    border: 1px solid rgba(200,150,40,0.35);
    border-radius: 50%;
    animation: ring-pulse 2.2s ease-out infinite 3s;
  }
  .heart-ring-2 {
    position: absolute; inset: -38px;
    border: 1px solid rgba(200,150,40,0.15);
    border-radius: 50%;
    animation: ring-pulse 2.2s ease-out infinite 3.3s;
  }
  @keyframes ring-pulse {
    0% { transform: scale(0.8); opacity: 0.9; }
    100% { transform: scale(1.5); opacity: 0; }
  }

  .message-card {
    max-width: 540px;
    width: 100%;
    background: rgba(15,5,3,0.55);
    border: 1px solid rgba(200,140,30,0.22);
    border-radius: 2px;
    padding: 52px 48px;
    text-align: center;
    backdrop-filter: blur(20px);
    position: relative;
    opacity: 0;
    animation: fadeUp 1.5s ease forwards 2.2s;
    box-shadow:
      0 0 80px rgba(184,0,31,0.08),
      inset 0 0 60px rgba(180,120,20,0.04),
      0 1px 0 rgba(200,140,30,0.15) inset,
      0 -1px 0 rgba(200,140,30,0.15) inset;
  }

  /* Corner ornaments */
  .message-card::before, .message-card::after {
    font-family: serif;
    position: absolute;
    color: rgba(200,140,30,0.35);
    font-size: 1.1rem;
    line-height: 1;
  }
  .message-card::before { content: '✦'; top: 14px; left: 18px; }
  .message-card::after  { content: '✦'; bottom: 14px; right: 18px; }

  .card-corner-tr {
    position: absolute; top: 14px; right: 18px;
    color: rgba(200,140,30,0.35); font-size: 1.1rem;
  }
  .card-corner-bl {
    position: absolute; bottom: 14px; left: 18px;
    color: rgba(200,140,30,0.35); font-size: 1.1rem;
  }

  .message-text {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(1.05rem, 2.5vw, 1.25rem);
    line-height: 2;
    color: rgba(253,243,227,0.82);
    font-weight: 300;
  }
  .message-text .highlight {
    color: var(--gold-light);
    font-weight: 400;
    font-style: normal;
  }
  .message-text .red-accent {
    color: #e8504a;
    font-style: normal;
    font-weight: 400;
  }

  .divider {
    display: flex; align-items: center; gap: 14px;
    margin: 28px auto;
    color: rgba(200,140,30,0.4);
    font-size: 0.7rem;
    letter-spacing: 0.3em;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(200,140,30,0.3));
  }
  .divider::after { background: linear-gradient(90deg, rgba(200,140,30,0.3), transparent); }

  .signature {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 1rem;
    color: var(--gold);
    opacity: 0;
    animation: fadeUp 1s ease forwards 3.4s;
    margin-top: 44px;
    letter-spacing: 0.08em;
    filter: drop-shadow(0 0 8px rgba(200,140,30,0.3));
  }

  .footer-ornament {
    margin-top: 44px;
    opacity: 0;
    animation: fadeUp 1s ease forwards 3.7s;
    font-size: 1.3rem;
    letter-spacing: 0.5em;
    color: var(--gold);
    filter: drop-shadow(0 0 8px rgba(200,140,30,0.4));
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-trail" id="cursorTrail"></div>

<div class="bg-layer"></div>
<div class="bg-glow glow-1"></div>
<div class="bg-glow glow-2"></div>
<div class="bg-glow glow-3"></div>

<div class="ornament-line top"></div>
<div class="ornament-line bot"></div>
<div class="ornament-col left"></div>
<div class="ornament-col right"></div>

<div class="stars" id="stars"></div>
<div class="petals-container" id="petals"></div>

<div class="scene">
  <div class="date-tag">8 · March · 2026</div>
  <div class="filigree">— ✦ —</div>

  <div class="main-title">Yêu<span class="name-display">Ý</span>là real</div>

  <div class="heart-wrapper">
    <div class="heart-ring"></div>
    <div class="heart-ring-2"></div>
    <svg class="heart-svg" viewBox="0 0 100 90" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="hg" cx="40%" cy="25%" r="75%">
          <stop offset="0%" stop-color="#e84040"/>
          <stop offset="50%" stop-color="#b0001c"/>
          <stop offset="100%" stop-color="#6a000f"/>
        </radialGradient>
        <radialGradient id="hg2" cx="60%" cy="70%" r="50%">
          <stop offset="0%" stop-color="rgba(200,130,30,0.4)"/>
          <stop offset="100%" stop-color="transparent"/>
        </radialGradient>
      </defs>
      <path d="M50 85 C50 85 5 55 5 28 C5 14 16 5 28 5 C36 5 44 10 50 18 C56 10 64 5 72 5 C84 5 95 14 95 28 C95 55 50 85 50 85Z" fill="url(#hg)"/>
      <path d="M50 85 C50 85 5 55 5 28 C5 14 16 5 28 5 C36 5 44 10 50 18 C56 10 64 5 72 5 C84 5 95 14 95 28 C95 55 50 85 50 85Z" fill="url(#hg2)"/>
      <ellipse cx="33" cy="24" rx="9" ry="5" fill="rgba(255,255,255,0.18)" transform="rotate(-25 33 24)"/>
    </svg>
  </div>

  <div class="message-card">
    <span class="card-corner-tr">✦</span>
    <span class="card-corner-bl">✦</span>
    
    <p class="message-text">	
      Hôm nay ngày 8 tháng 3.<br>
      Ra vườn hái một bông hoa tặng <span class="highlight">nàng</span>.<br>
      Hái hoa lại sợ hoa tàn<br>
      Nên đành lặng lẽ tặng nàng chữ <span class="red-accent">yêu</span>.<br>
    </p>
    
  </div>

  <div class="signature">— With love that knows no measure - Danh ngôn —</div>
  <div class="footer-ornament">✦ &nbsp; 🌹 &nbsp; ✦</div>
</div>

<script>
  const cursor = document.getElementById('cursor');
  const trail = document.getElementById('cursorTrail');
  let mx = 0, my = 0, tx = 0, ty = 0;
  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    cursor.style.left = mx + 'px';
    cursor.style.top = my + 'px';
  });
  setInterval(() => {
    tx += (mx - tx) * 0.22;
    ty += (my - ty) * 0.22;
    trail.style.left = tx + 'px';
    trail.style.top = ty + 'px';
  }, 16);

  // Stars — warm gold tinted
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 130; i++) {
    const s = document.createElement('div');
    const isGold = Math.random() < 0.25;
    s.className = 'star';
    s.style.cssText = `
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      --dur:${2.5+Math.random()*4}s;
      --delay:${Math.random()*6}s;
      --bright:${0.35+Math.random()*0.65};
      width:${Math.random()<0.15?3:2}px;
      height:${Math.random()<0.15?3:2}px;
      background:${isGold ? '#f0d080' : 'white'};
    `;
    starsEl.appendChild(s);
  }

  // Petals — roses and gold
  const petalsEl = document.getElementById('petals');
  const petalEmojis = ['🌹','🌹','🌹','✨','🌸','💫'];
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    p.textContent = petalEmojis[Math.floor(Math.random()*petalEmojis.length)];
    p.style.cssText = `
      left:${Math.random()*100}%;
      --size:${13+Math.random()*16}px;
      --fall-dur:${8+Math.random()*10}s;
      --fall-delay:${Math.random()*14}s;
    `;
    petalsEl.appendChild(p);
  }

  // Gold sparkles on click
  const sparkStyle = document.createElement('style');
  sparkStyle.textContent = `@keyframes spark-out {
    0%   { transform: translate(-50%,-50%) translate(0,0) scale(1); opacity:1; }
    100% { transform: translate(-50%,-50%) translate(var(--dx),var(--dy)) scale(0); opacity:0; }
  }`;
  document.head.appendChild(sparkStyle);

  document.addEventListener('click', e => {
    const colors = ['#f0cc70','#e0102e','#c9882a','#fdf3e3'];
    for (let i = 0; i < 10; i++) {
      const spark = document.createElement('div');
      const angle = (i/10)*360 + Math.random()*20;
      const dist = 35+Math.random()*45;
      spark.style.cssText = `
        position:fixed; left:${e.clientX}px; top:${e.clientY}px;
        width:${4+Math.random()*4}px; height:${4+Math.random()*4}px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        border-radius:50%; pointer-events:none; z-index:9999;
        transform:translate(-50%,-50%);
        --dx:${Math.cos(angle*Math.PI/180)*dist}px;
        --dy:${Math.sin(angle*Math.PI/180)*dist}px;
        animation: spark-out 0.75s ease forwards;
        box-shadow: 0 0 6px currentColor;
      `;
      document.body.appendChild(spark);
      setTimeout(()=>spark.remove(), 800);
    }
  });
</script>
</body>
</html>
